<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ARIA Pastelería</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #333; }

.login-page { display: none; position: fixed; inset: 0; background: linear-gradient(135deg, #4B4E2B 0%, #332C24 100%); z-index: 1000; place-items: center; }
.login-page.show { display: grid; }
.login-box { background: white; border-radius: 1.5rem; padding: 3rem; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-box h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #4B4E2B; }
.login-box label { display: block; font-size: .9rem; font-weight: 600; margin-bottom: .5rem; color: #333; }
.login-box input { width: 100%; padding: .8rem; border: 1px solid #ddd; border-radius: .5rem; margin-bottom: 1.5rem; font-size: .95rem; }
.login-box button { width: 100%; padding: 1rem; background: #AE603B; color: white; border: none; border-radius: .5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .3s; }
.login-box button:hover { background: #4B4E2B; }
.login-box .error { color: #d32f2f; font-size: .85rem; margin-bottom: 1rem; }

.admin-page { display: none; }
.admin-page.show { display: block; }

.admin-header { background: #4B4E2B; color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
.admin-header h1 { font-size: 1.5rem; }
.logout-btn { background: #AE603B; color: white; border: none; padding: .6rem 1.2rem; border-radius: .4rem; cursor: pointer; font-weight: 600; }
.logout-btn:hover { background: #d32f2f; }

.admin-container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

.tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #ddd; }
.tab { padding: 1rem; border: none; background: none; cursor: pointer; font-size: .95rem; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all .3s; }
.tab.active { color: #AE603B; border-bottom-color: #AE603B; }

.tab-content { display: none; }
.tab-content.show { display: block; }

.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: .5rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: .8rem; border: 1px solid #ddd; border-radius: .4rem; font-size: .95rem; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 100px; }

.btn { padding: .8rem 1.5rem; border: none; border-radius: .4rem; cursor: pointer; font-weight: 600; transition: all .3s; font-size: .95rem; }
.btn-primary { background: #AE603B; color: white; }
.btn-primary:hover { background: #4B4E2B; }
.btn-danger { background: #d32f2f; color: white; }
.btn-danger:hover { background: #b71c1c; }

.products-table { width: 100%; border-collapse: collapse; background: white; border-radius: .8rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.products-table th { background: #f5f5f5; padding: 1rem; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
.products-table td { padding: 1rem; border-bottom: 1px solid #ddd; }
.products-table tr:hover { background: #fafafa; }

.actions { display: flex; gap: .5rem; }
.btn-sm { padding: .4rem .8rem; font-size: .85rem; }

.form-section { background: white; padding: 2rem; border-radius: .8rem; box-shadow: 0 2px 8px rgba(0,0,0,.1); margin-bottom: 2rem; }

.success { color: #2e7d32; background: #e8f5e9; padding: 1rem; border-radius: .4rem; margin-bottom: 1rem; }
.error-msg { color: #d32f2f; background: #ffebee; padding: 1rem; border-radius: .4rem; margin-bottom: 1rem; }

.grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 768px) {
  .grid-form { grid-template-columns: 1fr; }
  .admin-header { flex-direction: column; gap: 1rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page show" id="loginPage">
  <div class="login-box">
    <h1>Admin Panel</h1>
    <div class="error" id="loginError"></div>
    <div>
      <label>Usuario</label>
      <input type="text" id="username" value="admin">
    </div>
    <div>
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Contraseña">
    </div>
    <button onclick="login()">Ingresar</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-page" id="adminPage">
  <div class="admin-header">
    <h1>Panel de Administración — ARIA Bakery</h1>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="admin-container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('productos')">Productos</button>
      <button class="tab" onclick="switchTab('crear')">Crear Producto</button>
    </div>

    <!-- TAB: PRODUCTOS -->
    <div class="tab-content show" id="tab-productos">
      <div class="form-section">
        <h2 style="margin-bottom: 1.5rem;">Productos</h2>
        <div id="statusMsg"></div>
        <table class="products-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- TAB: CREAR PRODUCTO -->
    <div class="tab-content" id="tab-crear">
      <div class="form-section">
        <h2 style="margin-bottom: 1.5rem;">Crear Nuevo Producto</h2>
        <div id="createStatus"></div>
        <form onsubmit="saveProduct(event)">
          <div class="grid-form">
            <div class="form-group">
              <label>Nombre *</label>
              <input type="text" id="newNombre" required>
            </div>
            <div class="form-group">
              <label>Categoría *</label>
              <select id="newCategoria" required>
                <option value="">Seleccionar...</option>
                <option value="Chipa">Chipa</option>
                <option value="Budines">Budines</option>
                <option value="Alfajores">Alfajores</option>
                <option value="Cookies">Cookies</option>
                <option value="Tortas">Tortas</option>
              </select>
            </div>
            <div class="form-group" style="grid-column: 1/-1">
              <label>Descripción *</label>
              <textarea id="newDescripcion" required></textarea>
            </div>
            <div class="form-group" style="grid-column: 1/-1">
              <label>Detalles</label>
              <textarea id="newDetalles"></textarea>
            </div>
            <div class="form-group">
              <label>URL Imagen</label>
              <input type="url" id="newFotoUrl">
            </div>
            <div class="form-group">
              <label>
                <input type="checkbox" id="newActivo" checked>
                Activo
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Guardar Producto</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fecvwfjoyfqzlsgmhzty.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlY3Z3ZmpveWZxemxzZ21oenR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODkyMjMsImV4cCI6MjA5MTI2NTIyM30.k49UEWC3A7_E0Lp-OdCG-EZ7e52bYARdagjpjmdxF98';
const EDGE_FUNCTION = 'https://fecvwfjoyfqzlsgmhzty.supabase.co/functions/v1/admin-handler';

let session = null;
let allProducts = [];

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (user === 'admin' && pass === 'admin') {
    session = { user: 'admin', loggedAt: new Date() };
    document.getElementById('loginPage').classList.remove('show');
    document.getElementById('adminPage').classList.add('show');
    loadProducts();
  } else {
    document.getElementById('loginError').textContent = 'Credenciales inválidas';
  }
}

function logout() {
  session = null;
  document.getElementById('loginPage').classList.add('show');
  document.getElementById('adminPage').classList.remove('show');
  document.getElementById('password').value = '';
  document.getElementById('loginError').textContent = '';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('show');
  event.target.classList.add('active');
}

async function loadProducts() {
  try {
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/productos?select=*&order=id`,
      {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${SUPABASE_ANON}`
        }
      }
    );
    allProducts = await response.json();
    renderTable();
  } catch (error) {
    console.error('Error:', error);
  }
}

function renderTable() {
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = allProducts.map(p => `
    <tr>
      <td><strong>${p.nombre}</strong></td>
      <td>${p.categoria}</td>
      <td>${p.descripcion.substring(0, 50)}...</td>
      <td>
        <div class="actions">
          <button class="btn btn-sm btn-primary" onclick="editProduct(${p.id})">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Eliminar</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function saveProduct(e) {
  e.preventDefault();

  const data = {
    nombre: document.getElementById('newNombre').value,
    categoria: document.getElementById('newCategoria').value,
    descripcion: document.getElementById('newDescripcion').value,
    detalles: document.getElementById('newDetalles').value,
    foto_url: document.getElementById('newFotoUrl').value,
    activo: document.getElementById('newActivo').checked
  };

  try {
    const response = await fetch(EDGE_FUNCTION, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'create',
        password: 'admin',
        data: data
      })
    });

    const result = await response.json();

    if (result.success) {
      document.getElementById('createStatus').innerHTML = '<div class="success">✅ Producto guardado correctamente</div>';
      document.querySelector('form').reset();
      loadProducts();
      setTimeout(() => {
        document.getElementById('createStatus').innerHTML = '';
      }, 3000);
    } else {
      document.getElementById('createStatus').innerHTML = `<div class="error-msg">❌ Error: ${result.error}</div>`;
    }
  } catch (error) {
    document.getElementById('createStatus').innerHTML = `<div class="error-msg">❌ Error: ${error.message}</div>`;
  }
}

async function deleteProduct(id) {
  if (!confirm('¿Estás seguro?')) return;

  try {
    const response = await fetch(EDGE_FUNCTION, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'delete',
        password: 'admin',
        id: id
      })
    });

    const result = await response.json();
    if (result.success) {
      document.getElementById('statusMsg').innerHTML = '<div class="success">✅ Producto eliminado</div>';
      loadProducts();
      setTimeout(() => {
        document.getElementById('statusMsg').innerHTML = '';
      }, 3000);
    }
  } catch (error) {
    console.error('Error:', error);
  }
}

function editProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (p) {
    document.getElementById('newNombre').value = p.nombre;
    document.getElementById('newCategoria').value = p.categoria;
    document.getElementById('newDescripcion').value = p.descripcion;
    document.getElementById('newDetalles').value = p.detalles || '';
    document.getElementById('newFotoUrl').value = p.foto_url || '';
    document.getElementById('newActivo').checked = p.activo;

    // Cambiar a "Actualizar"
    const btn = document.querySelector('form button');
    btn.textContent = 'Actualizar Producto';
    btn.onclick = (e) => updateProduct(e, id);

    switchTab('crear');
  }
}

async function updateProduct(e, id) {
  e.preventDefault();

  const data = {
    nombre: document.getElementById('newNombre').value,
    categoria: document.getElementById('newCategoria').value,
    descripcion: document.getElementById('newDescripcion').value,
    detalles: document.getElementById('newDetalles').value,
    foto_url: document.getElementById('newFotoUrl').value,
    activo: document.getElementById('newActivo').checked
  };

  try {
    const response = await fetch(EDGE_FUNCTION, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'update',
        password: 'admin',
        id: id,
        data: data
      })
    });

    const result = await response.json();

    if (result.success) {
      document.getElementById('createStatus').innerHTML = '<div class="success">✅ Producto actualizado</div>';
      document.querySelector('form').reset();
      document.querySelector('form button').textContent = 'Guardar Producto';
      document.querySelector('form button').onclick = null;
      loadProducts();
      setTimeout(() => {
        document.getElementById('createStatus').innerHTML = '';
      }, 3000);
    }
  } catch (error) {
    console.error('Error:', error);
  }
}

// Focus password field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('password').focus();
});
</script>
</body>
</html>
